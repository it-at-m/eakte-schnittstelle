
get:
  tags:
    - "/userFormsData"
  summary: Lesen von Verfahrensdaten zu einer Akte, Vorgang oder Dokument
  description: Zusätzlich zum Wert der Eigenschaften werden auch alle Schlüsselwerte zurückgegeben. Als Ergebnis wird eine Liste von Strings zurück geliefert, um zu gewährleisten, dass beim Lesen der Verfahrensdaten auch symmetrisch der Wert im Format Array übergeben wird.
  operationId: "ReadUserFormsData"
  parameters:
    - name: "reference"
      in: "query"
      required: true
      schema:
        type: "string"
    - $ref: 'eakte-api--parameters.yaml#/components/parameters/x_anwendung'
    - $ref: 'eakte-api--parameters.yaml#/components/parameters/userlogin'
    - $ref: 'eakte-api--parameters.yaml#/components/parameters/joboe'
    - $ref: 'eakte-api--parameters.yaml#/components/parameters/jobposition'
    - $ref: 'eakte-api--parameters.yaml#/components/parameters/objaddress'
  responses:
    "200":
      description: "OK"
      content:
        application/json:
          schema:
            $ref: "eakte-api-userFormsData-schemas.yaml#/components/schemas/ReadUserFormsDataResponseDTO"
    '400':
      $ref: 'eakte-api--default-responses.yaml#/components/responses/400'
    '401':
      $ref: 'eakte-api--default-responses.yaml#/components/responses/401'
    '500':
      $ref: 'eakte-api--default-responses.yaml#/components/responses/500'

put:
  tags:
    - "/userFormsData"
  summary: Verfahrensdaten für Akten, Vorgänge oder Dokumente ändern
  description: Eine Liste von Referenz-Wert-Paaren von Verfahrenseigenschaften wird ausgewertet und mit Hilfe einer neuen Hilfsaktion SetUserFormData gesetzt. Die Gültigkeit der übergebenen Referenz (= Programmiername) wird anhand der Definition für Verfahren ermittelt und geprüft.
  operationId: "UpdateUserFormsData"
  parameters:
    - $ref: 'eakte-api--parameters.yaml#/components/parameters/x_anwendung'
    - $ref: 'eakte-api--parameters.yaml#/components/parameters/userlogin'
    - $ref: 'eakte-api--parameters.yaml#/components/parameters/joboe'
    - $ref: 'eakte-api--parameters.yaml#/components/parameters/jobposition'
    - $ref: 'eakte-api--parameters.yaml#/components/parameters/objaddress'
  requestBody:
    content:
      application/json:
        schema:
          $ref: "eakte-api-userFormsData-schemas.yaml#/components/schemas/UpdateUserFormsDataRequestDTO"
    required: true
  responses:
    '204':
      $ref: 'eakte-api--default-responses.yaml#/components/responses/204'
    '400':
      $ref: 'eakte-api--default-responses.yaml#/components/responses/400'
    '401':
      $ref: 'eakte-api--default-responses.yaml#/components/responses/401'
    '500':
      $ref: 'eakte-api--default-responses.yaml#/components/responses/500'
